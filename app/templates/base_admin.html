<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Signing Admin{% endblock %} — Finanzsurfer</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-brand">
      <img src="/static/assets/logo-dark.png" alt="Finanzsurfer" style="height: 28px;">
      <span style="margin-left: 8px; font-weight: 600; font-size: 13px; color: #8D5F4E;">Signing</span>
    </div>
    <div class="nav-links">
      <a href="/admin/contracts">Verträge</a>
      <a href="/admin/contracts/new">+ Neuer Vertrag</a>
      <form action="/logout" method="post" style="display:inline;">
        <button type="submit" class="btn-link">Logout</button>
      </form>
    </div>
  </nav>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
