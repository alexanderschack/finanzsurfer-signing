<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Finanzsurfer Signing</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <div class="card" style="width: 100%; max-width: 400px;">
    <div style="text-align: center; margin-bottom: 24px;">
      <img src="/static/assets/logo-dark.png" alt="Finanzsurfer" style="height: 40px;">
      <p style="color: #8D5F4E; font-size: 13px; margin-top: 8px;">Signing Admin</p>
    </div>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="form-group">
        <label for="email">E-Mail</label>
        <input type="email" id="email" name="email" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%;">Anmelden</button>
    </form>
  </div>
</body>
</html>
